<div class="results-container">

  <app-filter-sidebar
    [availableAirlines]="airlines"
    (filtersChanged)="applyFilters($event)">
  </app-filter-sidebar>

  <div class="flight-list" *ngIf="filteredFlights && filteredFlights.length > 0; else noData">
    <app-flight-card
      *ngFor="let flight of filteredFlights"
      [flight]="flight"
      (bookFlight)="book($event)">
    </app-flight-card>
  </div>

  <ng-template #noData>
    No Flights Available
  </ng-template>
  
</div>
